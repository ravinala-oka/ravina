<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RAVINA — Bangle Staff Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #c9a84c;
  --accent-pale: #fdf8ee;
  --dark: #1a1a18;
  --soft: #8a8a7e;
  --border: #e0dbd0;
  --bg: #faf8f4;
  --white: #ffffff;
  --footer-bg: #1a1a18;
  --footer-text: #fdf8ee;
  --footer-soft: #ab9d7a;
  --total-accent: #ddc26f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--dark);
  font-size: 13px;
}

/* ─── レイアウト ─── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--white);
}

/* トップバー */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--white);
  flex-shrink: 0;
}
.topbar-title { font-size: 15px; font-weight: 700; letter-spacing: 0.05em; color: var(--dark); }
.topbar-sub   { font-size: 10px; color: var(--soft); margin-top: 1px; }
.btn-reset {
  font-size: 11px; padding: 5px 14px;
  border: 1.5px solid var(--border); border-radius: 6px;
  background: var(--white); color: var(--soft); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; font-weight: 500; transition: all 0.15s;
}
.btn-reset:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-pale); }
.btn-ring { border-color: #9c7a3c; color: #9c7a3c; }
.btn-ring:hover { border-color: #9c7a3c; color: #ffffff; background: #9c7a3c; }
.btn-close {
  width: 28px; height: 28px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; line-height: 1;
}

/* スクロールエリア */
#scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 12px 6px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* セクション */
.sec { display: flex; flex-direction: column; gap: 5px; }
.sec-label {
  font-size: 9px; letter-spacing: 0.18em; color: var(--soft);
  text-transform: uppercase; font-weight: 700;
}

/* 素材 4列 */
.mat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.btn-mat {
  border: 1.5px solid var(--border); background: var(--white);
  border-radius: 8px; padding: 6px 3px 5px;
  font-size: 11px; line-height: 1.3; cursor: pointer;
  text-align: center; font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s; color: var(--dark); font-weight: 500;
}
.btn-mat span { display: block; font-size: 9px; color: var(--soft); margin-top: 1px; font-weight: 400; }
.btn-mat:hover, .btn-mat.active {
  background: var(--accent-pale); border-color: var(--accent); color: var(--accent);
  box-shadow: inset 0 0 0 1px var(--accent);
}
.btn-mat.active span { color: var(--accent); opacity: 0.75; }

/* 幅ボタン共通 */
.width-row { display: grid; gap: 4px; }
.width-row.w7 { grid-template-columns: repeat(7, 1fr); }
.width-row.w5 { grid-template-columns: repeat(5, 1fr); }
.btn-w {
  border: 1.5px solid var(--border); background: var(--white);
  border-radius: 8px; padding: 4px 2px;
  font-size: 9px; cursor: pointer; text-align: center;
  font-family: 'Noto Sans JP', sans-serif; color: var(--dark); font-weight: 500;
  transition: all 0.15s; line-height: 1.3;
  aspect-ratio: 1 / 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
}
.btn-w svg { display: block; width: 70%; height: auto; max-height: 18px; overflow: visible; }
.btn-w circle, .btn-w ellipse, .btn-w rect { fill: #c9bfa1; transition: fill 0.15s; }
.btn-w:hover circle,  .btn-w.active circle,
.btn-w:hover ellipse, .btn-w.active ellipse,
.btn-w:hover rect,    .btn-w.active rect  { fill: var(--accent); opacity: 0.8; }
.btn-w:hover, .btn-w.active {
  background: var(--accent-pale); border-color: var(--accent); color: var(--accent);
  box-shadow: inset 0 0 0 1px var(--accent);
}

/* Silver info */
.sv-note {
  font-size: 9px; color: var(--soft); background: var(--bg);
  border-radius: 5px; padding: 4px 8px; letter-spacing: 0.03em;
}

/* cm ステッパー */
.cm-row {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: var(--bg); border-radius: 10px; padding: 10px 12px 8px;
}
.cm-label { font-size: 11px; color: var(--soft); font-weight: 500; letter-spacing: 0.04em; }
.cm-stepper { display: flex; align-items: center; }
.cm-btn {
  width: 54px; height: 54px; border: 1.5px solid var(--border);
  background: var(--white); color: var(--dark); font-size: 28px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-weight: 700; transition: background 0.1s;
}
.cm-btn:first-child { border-radius: 10px 0 0 10px; }
.cm-btn:last-child  { border-radius: 0 10px 10px 0; }
.cm-btn:hover { background: var(--accent-pale); color: var(--accent); border-color: var(--accent); }
.cm-val {
  min-width: 72px; height: 54px; text-align: center; font-size: 30px; font-weight: 700;
  border-top: 1.5px solid var(--border); border-bottom: 1.5px solid var(--border);
  background: var(--white); display: flex; align-items: center; justify-content: center;
}
.cm-unit { font-size: 16px; color: var(--soft); font-weight: 500; }
.cm-unit-price { font-size: 10px; color: var(--soft); }

/* オプション行 */
.opts { display: flex; flex-direction: column; }
.opt-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.opt-row:last-child { border-bottom: none; }
.opt-name { font-size: 12px; font-weight: 500; }
.opt-note { font-size: 9px; color: var(--soft); margin-top: 1px; }
.i18n { font-size: 9px; color: var(--soft); font-weight: 400; margin-left: 5px; opacity: 0.8; }

/* トグルスイッチ */
.toggle-wrap { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle-wrap input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: #e0dbd0; border-radius: 20px; cursor: pointer; transition: background 0.2s;
}
.toggle-slider:before {
  content: ""; position: absolute; width: 14px; height: 14px;
  background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s;
}
.toggle-wrap input:checked + .toggle-slider { background: var(--accent); }
.toggle-wrap input:checked + .toggle-slider:before { transform: translateX(16px); }

/* カウンター */
.counter { display: flex; align-items: center; }
.counter-btn {
  width: 26px; height: 26px; border: 1.5px solid var(--border);
  background: var(--white); color: var(--dark); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-weight: 700; transition: background 0.1s;
}
.counter-btn:first-child { border-radius: 6px 0 0 6px; }
.counter-btn:last-child  { border-radius: 0 6px 6px 0; }
.counter-btn:hover { background: var(--accent-pale); color: var(--accent); border-color: var(--accent); }
.counter-val {
  width: 30px; height: 26px; text-align: center; font-size: 13px; font-weight: 700;
  border-top: 1.5px solid var(--border); border-bottom: 1.5px solid var(--border);
  background: var(--white); display: flex; align-items: center; justify-content: center;
}

/* 固定フッター */
#footer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--footer-bg);
  padding: 8px 12px 10px;
}
.res-rows { display: flex; flex-direction: column; gap: 3px; margin-bottom: 4px; }
.res-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 11px; color: var(--footer-soft);
}
.res-row.total {
  font-size: 17px; color: var(--footer-text);
  font-weight: 700; letter-spacing: 0.02em;
  margin-top: 4px; padding-top: 6px; border-top: 1px solid #3a382f;
}
.res-row.total span:last-child { color: var(--total-accent); font-size: 21px; }
#price-loading { display:none; text-align:center; font-size:10px; color:var(--footer-soft); padding:4px 0; }
#sheet-status  { display:none; font-size:9px; text-align:center; margin-top:3px; }
</style>
</head>

let mat   = "silver";

function setMat(el){

}

function setWidth(el, grp){

function getWidth(){
  if(mat==="silver"){
    const el = document.querySelector("#width-group-silver .btn-w.active");
    return el ? el.dataset.val : "2";
  } else {
    const el = document.querySelector("#width-group-gold .btn-w.active");
    return el ? el.dataset.val : "2";
  }
}

function fmt(n){ return "¥"+Math.round(n).toLocaleString("ja-JP"); }

// ============================================================
// 計算
// ============================================================
function calc(){
  const width = getWidth();
  let basePrice = 0, subtitle = "", prodNumStr = "";

  if(mat==="silver"){
    const isLong = document.getElementById("silver-18cm-toggle") && document.getElementById("silver-18cm-toggle").checked;
    basePrice = (isLong ? bPriceSilver18[width] : bPriceSilver[width]) || 0;
    const wLabel = {"2":"2mm","2.5":"2.5mm","3":"3mm","4x2":"4×2mm","5x2":"5×2mm","6x2":"6×2mm","10x2":"10×2mm"}[width]||width;
    subtitle  = "Silver / "+wLabel+(isLong ? " / 18cm以上" : "");
    const pn = bProductNum.silver[width];
    prodNumStr = pn ? "商品番号 / No.："+pn : "";
  } else {
    const cmKey = String(cmVal);
    const matLabel = {"10K":"K10","18K":"K18","pt":"Pt900"}[mat]||mat;
    const wLabel   = {"2":"2mm","2.5":"2.5mm","3":"3mm","4x2":"4×2mm","5x2":"5×2mm"}[width]||width;
    const cmTable  = (bPriceCm[mat]||{})[width]||{};
    const unit     = (bPriceUnit[mat]||{})[width]||0;
    basePrice = cmTable[cmKey] || (unit*cmVal) || 0;
    subtitle  = matLabel+" "+wLabel+" "+cmVal+"cm";
    document.getElementById("cm-unit-price").textContent = unit ? "1cm="+fmt(unit) : "";
    const cmMap = bProductNum[mat] && bProductNum[mat][width];
    prodNumStr = cmMap && cmMap[cmKey] ? "商品番号 / No.："+cmMap[cmKey] : "";
  }

  let total = basePrice;
  document.getElementById("r-base").textContent          = basePrice ? fmt(basePrice) : "—";
  document.getElementById("r-base-subtitle").textContent = subtitle;

  if(prodNumStr){
    document.getElementById("r-product-num").textContent = prodNumStr;
    document.getElementById("r-product-num-row").style.display = "flex";
  } else {
    document.getElementById("r-product-num-row").style.display = "none";
  }

  // つや加工
  const glossOn = document.getElementById("gloss-toggle") && document.getElementById("gloss-toggle").checked;
  if (glossOn) {
    total += 2200;
    document.getElementById("row-gloss").style.display = "flex";
  } else {
    document.getElementById("row-gloss").style.display = "none";
  }

  // 石留め
  if(counts.stone>0){
    const s = counts.stone*11000; total+=s;
    document.getElementById("lbl-stone").textContent = `ダイヤモンド×${counts.stone} Diamond×${counts.stone}`;
    document.getElementById("r-stone").textContent   = fmt(s);
    document.getElementById("row-stone").style.display = "flex";
  } else { document.getElementById("row-stone").style.display = "none"; }

  document.getElementById("r-total").textContent = total ? fmt(total) : "—";
}

// CSV取得（/gviz/tq = 認証不要・公開スプレ向け）
function parseCSV(text){
  const rows=[]; let cur="",inQ=false,row=[];
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){if(ch==='"' &&text[i+1]==='"'){ cur+='"';i++;}else if(ch==='"')inQ=false;else cur+=ch;}
    else{if(ch==='"'){ inQ=true;}else if(ch===','){ row.push(cur.trim());cur="";}else if(ch==='\n'){ row.push(cur.trim());if(row.some(c=>c!==""))rows.push(row);row=[];cur="";}else if(ch!=='\r')cur+=ch;}
  }
  if(cur!==""||row.length>0){row.push(cur.trim());if(row.some(c=>c!==""))rows.push(row);}
  return rows;
}
function toNum(v){ if(!v&&v!==0)return 0; return Number(String(v).replace(/[^0-9.-]/g,""))||0; }

// Price_Num シート解析
// 期待列: list | material | size | width | 商品番号 | price | carving_price
// バングル固有:
//   material=silver925  size=no_cm / 固定 / (数値以外)  → bPriceSilver[width]=price
//   material=10K/18K/pt size=1cm / unit               → bPriceUnit[mat][width]=price
//   material=10K/18K/pt size=cm_N / Ncm / N(数値cm)   → bPriceCm[mat][width][N]=price
//   商品番号列                                          → bProductNum
function parsePriceNumSheet(rows){
  if(!rows||rows.length<2)return false;
  const hdr=rows[0].map(h=>String(h).trim());
  const hL=hdr.map(h=>h.toLowerCase());
  const iL=hL.indexOf("list"),iM=hL.indexOf("material"),iS=hL.indexOf("size"),iW=hL.indexOf("width");
  const iPN=hdr.findIndex(h=>h==="商品番号"||h.toLowerCase()==="product_num"||h.toLowerCase()==="productnum");
  const iP=hdr.findIndex(h=>h.toLowerCase()==="price"||h==="価格"||h==="単価");
  if(iM<0||iS<0)return false;

  console.log("[RAVINA Bangle] header:", hdr);
  console.log("[RAVINA Bangle] col idx → mat:",iM,"size:",iS,"width:",iW,"price:",iP,"pn:",iPN,"list:",iL);

  function normMat(s){
    const l=s.toLowerCase();
    if(/silver/i.test(l))return "silver";
    if(/10k|k10/i.test(l))return "10K";
    if(/18k|k18/i.test(l))return "18K";
    if(/^pt|plat/i.test(l))return "pt";
    return null;
  }
  function normWidth(s){
    if(!s)return null;
    // ×→x、全角→半角
    const r=s.trim().replace(/[×ｘ]/g,"x").replace(/[－−]/g,"-");
    if(/^4x2$/i.test(r))return "4x2";
    if(/^5x2$/i.test(r))return "5x2";
    if(/^6x2$/i.test(r))return "6x2";
    if(/^10x2$/i.test(r))return "10x2";
    const n=parseFloat(r);
    return isNaN(n)?null:String(n);
  }
  // size 列からcm数値を抽出。"cm_10","10cm","10","10.0cm" → "10"
  // "1cm","unit","no_cm" → null（単価行として扱う）
  function normSizeCm(s){
    const lower=s.toLowerCase().trim();
    // 単価・固定行パターン
    if(lower==="1cm"||lower==="unit"||lower==="no_cm"||lower==="fixed"||lower===""||lower==="固定")return null;
    // cm_N 形式
    const m1=lower.match(/^cm_?(\d+(?:\.\d+)?)$/);
    if(m1)return m1[1];
    // Ncm 形式
    const m2=lower.match(/^(\d+(?:\.\d+)?)cm$/);
    if(m2)return m2[1];
    // 純数値
    const m3=lower.match(/^(\d+(?:\.\d+)?)$/);
    if(m3)return m3[1];
    return null;
  }
  // size列が「単価行」かどうか判定
  function isUnitRow(s){
    const lower=s.toLowerCase().trim();
    return lower==="1cm"||lower==="unit"||lower==="no_cm"||lower==="fixed";
  }

  const newSv={},newSv18={},newU={"10K":{},"18K":{},"pt":{}},newC={"10K":{},"18K":{},"pt":{}},newPN={};
  let parsedRows=0;

  for(let i=1;i<rows.length;i++){
    const v=rows[i]; if(!v||!v.length)continue;
    if(iL>=0){const lt=String(v[iL]||"").trim().toLowerCase();if(lt&&lt!=="bangle")continue;}
    const mat=normMat(String(v[iM]||"").trim()); if(!mat)continue;
    const szRaw=String(v[iS]||"").trim();
    const price=iP>=0?toNum(v[iP]):0;
    const pnRaw=iPN>=0?String(v[iPN]||"").trim():"";

    parsedRows++;
    if(parsedRows<=4)console.log("[RAVINA Bangle] row",i,"mat:",mat,"sz:",szRaw,"w:",iW>=0?v[iW]:"?","price:",price,"pn:",pnRaw);

    if(iW<0)continue;
    const w=normWidth(String(v[iW]||"").trim());
    if(!w)continue;

    if(mat==="silver"){
      // Silver: size列が18cm系なら18cm以上価格、それ以外(no_cm/固定/空欄)は基本価格
      const szLower=szRaw.toLowerCase();
      const is18 = szLower==="18cm"||szLower==="18"||szLower==="cm_18";
      if(is18){ if(price>0)newSv18[w]=price; }
      else { if(price>0)newSv[w]=price; }
      if(pnRaw){if(!newPN.silver)newPN.silver={};newPN.silver[w]=pnRaw;}
    } else {
      // Gold/Pt: size列で単価行とcm行を区別
      if(isUnitRow(szRaw)){
        if(price>0)newU[mat][w]=price;
        // 単価行に商品番号はない想定（あれば格納しない）
      } else {
        const cm=normSizeCm(szRaw);
        if(!cm)continue;
        if(price>0){if(!newC[mat][w])newC[mat][w]={};newC[mat][w][cm]=price;}
        if(pnRaw){
          if(!newPN[mat])newPN[mat]={};
          if(!newPN[mat][w])newPN[mat][w]={};
          newPN[mat][w][cm]=pnRaw;
        }
      }
    }
  }

  console.log("[RAVINA Bangle] parsed rows:",parsedRows);
  console.log("[RAVINA Bangle] newSv keys:",Object.keys(newSv));
  console.log("[RAVINA Bangle] newPN keys:",Object.keys(newPN));
  ["10K","18K","pt"].forEach(m=>{
    console.log("[RAVINA Bangle] newC["+m+"] keys:",Object.keys(newC[m]));
  });

  // 素材ごとに更新（取得できた幅のみ上書き・スプレにない幅はフォールバックを保持）
  if(Object.keys(newSv).length>0) Object.assign(bPriceSilver, newSv);
  if(Object.keys(newSv18).length>0) Object.assign(bPriceSilver18, newSv18);
  ["10K","18K","pt"].forEach(m=>{
    if(Object.keys(newU[m]).length>0) Object.assign(bPriceUnit[m], newU[m]);
    if(Object.keys(newC[m]).length>0){
      // cm別テーブルも幅キー単位でマージ
      for(const [w, cmMap] of Object.entries(newC[m])){
        if(!bPriceCm[m]) bPriceCm[m]={};
        if(!bPriceCm[m][w]) bPriceCm[m][w]={};
        Object.assign(bPriceCm[m][w], cmMap);
      }
    }
  });

  // 商品番号：素材ごとにマージ（silver だけ取れても 10K/18K/pt はフォールバック維持）
  if(Object.keys(newPN).length>0){
    // フォールバックをベースにシートの値で上書き
    const merged=JSON.parse(JSON.stringify(bProductNum));
    for(const [m,v] of Object.entries(newPN)){
      if(typeof v==="object"&&!Array.isArray(v)){
        if(!merged[m])merged[m]={};
        for(const [k2,v2] of Object.entries(v)){
          if(typeof v2==="object"){
            if(!merged[m][k2])merged[m][k2]={};
            Object.assign(merged[m][k2],v2);
          } else {
            merged[m][k2]=v2;
          }
        }
      }
    }
    bProductNum=merged;
  }
  return true;
}

async function initPrices(){
  document.getElementById("price-loading").style.display="block";
  try{
    if(!GAS_URL||GAS_URL==="YOUR_GAS_DEPLOY_URL_HERE") throw new Error("GAS_URL未設定");
    const res=await fetch(GAS_URL,{cache:"no-store"});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const text=await res.text();
    if(text.trim().startsWith("ERROR:"))throw new Error(text.trim());
    parsePriceNumSheet(parseCSV(text));
    document.getElementById("price-loading").style.display="none";
    showStatus("ok");
  }catch(e){
    document.getElementById("price-loading").style.display="none";
    showStatus("error");
  }
  calc();
}
function showStatus(st){
  const el=document.getElementById("sheet-status");
  if(st==="ok"){el.textContent="✓ 最新価格 Latest prices";el.style.color="#6a9a6a";}
  else{el.textContent="⚠ オフライン価格 Offline prices";el.style.color="#c07a4a";}
  el.style.display="block";
}

initPrices();
