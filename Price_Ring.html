<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RAVINA — Staff Price Tool</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #c9a84c;
  --accent-pale: #fdf8ee;
  --accent-mid: #e9dcb8;
  --dark: #1a1a18;
  --soft: #8a8a7e;
  --border: #e0dbd0;
  --bg: #faf8f4;
  --white: #ffffff;
  --footer-bg: #1a1a18;
  --footer-text: #fdf8ee;
  --footer-soft: #ab9d7a;
  --total-accent: #ddc26f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--dark);
  font-size: 13px;
}

/* ─── レイアウト: 上部スクロール + 下部固定 ─── */
#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  background: var(--white);
}

/* トップバー */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--white);
  flex-shrink: 0;
}
.topbar-title {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 0.05em; color: var(--dark);
}
.topbar-sub { font-size: 10px; color: var(--soft); letter-spacing: 0.03em; margin-top: 1px; }
.btn-reset {
  font-size: 11px; padding: 5px 14px;
  border: 1.5px solid var(--border); border-radius: 6px;
  background: var(--white); color: var(--soft); cursor: pointer;
  font-family: 'Noto Sans JP', sans-serif; font-weight: 500;
  transition: all 0.15s;
}
.btn-reset:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-pale); }
.btn-bangle { border-color: #9c7a3c; color: #9c7a3c; }
.btn-bangle:hover { border-color: #9c7a3c; color: #ffffff; background: #9c7a3c; }
.btn-close {
  width: 28px; height: 28px; padding: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; line-height: 1;
}

/* スクロールエリア */
#scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 10px 12px 6px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* セクション共通 */
.sec { display: flex; flex-direction: column; gap: 5px; }
.sec-label {
  font-size: 9px; letter-spacing: 0.18em; color: var(--soft);
  text-transform: uppercase; font-weight: 700;
}

/* ── 素材: 横1行 4ボタン ── */
.mat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
.btn-mat {
  border: 1.5px solid var(--border); background: var(--white);
  border-radius: 8px; padding: 6px 3px 5px;
  font-size: 11px; line-height: 1.3; cursor: pointer;
  text-align: center; font-family: 'Noto Sans JP', sans-serif;
  transition: all 0.15s; color: var(--dark); font-weight: 500;
}
.btn-mat span { display: block; font-size: 9px; color: var(--soft); margin-top: 1px; font-weight: 400; }
.btn-mat:hover, .btn-mat.active {
  background: var(--accent-pale); border-color: var(--accent);
  color: var(--accent);
  box-shadow: inset 0 0 0 1px var(--accent);
}
.btn-mat.active span { color: var(--accent); opacity: 0.75; }

/* ── 幅: 4列×2行 ── */
.width-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
.btn-w {
  border: 1.5px solid var(--border); background: var(--white);
  border-radius: 8px; padding: 5px 2px 4px;
  font-size: 9px; cursor: pointer; text-align: center;
  font-family: 'Noto Sans JP', sans-serif; color: var(--dark); font-weight: 500;
  transition: all 0.15s; line-height: 1.3;
}
.btn-w svg { display: block; width: 22px; height: 16px; margin: 0 auto 2px; }
.btn-w ellipse, .btn-w rect { fill: #c9bfa1; transition: fill 0.15s; }
.btn-w:hover ellipse, .btn-w.active ellipse,
.btn-w:hover rect, .btn-w.active rect { fill: var(--accent); opacity: 0.7; }
.btn-w:hover, .btn-w.active {
  background: var(--accent-pale); border-color: var(--accent); color: var(--accent);
  box-shadow: inset 0 0 0 1px var(--accent);
}
.btn-w.disabled {
  opacity: 0.35; pointer-events: none; cursor: default;
}

/* ── 号数: Silver=2ボタン / その他=5ボタン ── */
.size-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; }
.size-row.other-mat { grid-template-columns: repeat(5, 1fr); }
.btn-s {
  border: 1.5px solid var(--border); background: var(--white);
  border-radius: 8px; padding: 7px 2px;
  font-size: 10px; cursor: pointer; text-align: center;
  font-family: 'Noto Sans JP', sans-serif; color: var(--dark); font-weight: 500;
  transition: all 0.15s;
}
.btn-s:hover, .btn-s.active {
  background: var(--accent-pale); border-color: var(--accent); color: var(--accent);
  box-shadow: inset 0 0 0 1px var(--accent);
}

/* ── オプション行 ── */
.opts { display: flex; flex-direction: column; gap: 0; }
.opt-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 0; border-bottom: 1px solid var(--border);
}
.opt-row:last-child { border-bottom: none; }
.opt-name { font-size: 12px; font-weight: 500; }
.opt-note { font-size: 9px; color: var(--soft); margin-top: 1px; }

/* トグル */
.toggle-wrap { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle-wrap input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: #e0dbd0; border-radius: 20px; cursor: pointer; transition: background 0.2s;
}
.toggle-slider:before {
  content: ""; position: absolute; width: 14px; height: 14px;
  background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s;
}
.toggle-wrap input:checked + .toggle-slider { background: var(--accent); }
.toggle-wrap input:checked + .toggle-slider:before { transform: translateX(16px); }

/* アコーディオン */
.accordion-sub {
  overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease;
  max-height: 0; opacity: 0;
}
.accordion-sub.open { max-height: 200px; opacity: 1; }

/* 彫り範囲ラジオ */
.sub-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 0 5px 10px; border-bottom: 1px solid var(--border);
}
.sub-row:last-child { border-bottom: none; }
.sub-label { font-size: 11px; color: var(--soft); font-weight: 500; }
.radio-group { display: flex; border: 1.5px solid var(--border); border-radius: 7px; overflow: hidden; }
.radio-btn {
  flex: 1; padding: 5px 6px; font-size: 11px; cursor: pointer;
  background: var(--white); color: var(--soft); border: none;
  border-right: 1px solid var(--border); transition: all 0.15s;
  white-space: nowrap; font-family: 'Noto Sans JP', sans-serif; text-align: center; font-weight: 400;
}
.radio-btn:last-child { border-right: none; }
.radio-btn.active { background: var(--accent-pale); color: var(--accent); font-weight: 700; }

/* カウンター */
.counter { display: flex; align-items: center; }
.counter-btn {
  width: 26px; height: 26px; border: 1.5px solid var(--border);
  background: var(--white); color: var(--dark); font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: background 0.1s; font-weight: 700;
}
.counter-btn:first-child { border-radius: 6px 0 0 6px; }
.counter-btn:last-child  { border-radius: 0 6px 6px 0; }
.counter-btn:hover { background: var(--accent-pale); color: var(--accent); border-color: var(--accent); }
.counter-val {
  width: 30px; height: 26px; text-align: center; font-size: 13px; font-weight: 700;
  border-top: 1.5px solid var(--border); border-bottom: 1.5px solid var(--border);
  border-left: none; border-right: none; background: var(--white);
  display: flex; align-items: center; justify-content: center;
}

/* 納期 3ボタン */
.del-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 4px; padding: 5px 0 3px 10px; }
.btn-del {
  border: 1.5px solid var(--border); background: var(--white);
  border-radius: 8px; padding: 6px 3px; font-size: 10px; cursor: pointer;
  text-align: center; font-family: 'Noto Sans JP', sans-serif; color: var(--dark); font-weight: 500;
  line-height: 1.4; transition: all 0.15s;
}
.btn-del.active { background: var(--accent-pale); border-color: var(--accent); color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent); }
.btn-del .del-note { font-size: 9px; color: var(--soft); display: block; }

/* ── 固定フッター: 結果 ── */
#footer {
  flex-shrink: 0;
  border-top: 1px solid var(--border);
  background: var(--footer-bg);
  padding: 8px 12px 10px;
}

/* 結果行 */
.res-rows { display: flex; flex-direction: column; gap: 3px; margin-bottom: 6px; }
.res-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 11px; color: var(--footer-soft);
}
.res-row.total {
  font-size: 17px; color: var(--footer-text);
  font-family: 'Noto Sans JP', sans-serif; font-weight: 700;
  letter-spacing: 0.02em; margin-top: 4px;
  padding-top: 6px; border-top: 1px solid #3a382f;
}
.res-row.total span:last-child { color: var(--total-accent); font-size: 21px; }

/* 商品番号 */
#r-product-num {
  font-size: 10px; color: var(--footer-soft); letter-spacing: 0.04em;
}

/* ローディング */
#price-loading { display:none; text-align:center; font-size:10px; color:var(--footer-soft); padding:4px 0; }
#sheet-status  { display:none; font-size:9px; text-align:center; margin-top:3px; letter-spacing:0.04em; }
</style>
</head>
<body>

<div id="app">

  <!-- トップバー -->
  <div class="topbar">
    <div>
      <div class="topbar-title">RAVINA — Ring Price</div>
      <div class="topbar-sub">指輪 料金</div>
    </div>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="btn-reset btn-bangle" onclick="location.href='Price_Bangle.html'">Bangle</button>
      <button class="btn-reset btn-close" onclick="window.close()">×</button>
    </div>
  </div>

  <!-- スクロールエリア -->
  <div id="scroll-area">

    <!-- 素材 -->
    <div class="sec">
      <div class="sec-label">Material — 素材</div>
      <div class="mat-row" id="material-group">
        <button class="btn-mat active" data-val="silver" onclick="setMat(this)">Silver<span>SV925</span></button>
        <button class="btn-mat" data-val="10K"    onclick="setMat(this)">Gold <span>K10</span></button>
        <button class="btn-mat" data-val="18K"    onclick="setMat(this)">Gold <span>K18</span></button>
        <button class="btn-mat" data-val="pt"     onclick="setMat(this)">Platinum<span>Pt900</span></button>
      </div>
    </div>

    <!-- 幅 -->
    <div class="sec">
      <div class="sec-label">Thickness — 幅</div>
      <div class="width-row" id="width-group">
        <button class="btn-w active" data-val="1" onclick="setWidth(this)">
          <svg viewBox="0 0 22 16"><ellipse cx="11" cy="8" rx="4" ry="4"/></svg>1.0
        </button>
        <button class="btn-w" data-val="1.5" onclick="setWidth(this)">
          <svg viewBox="0 0 22 16"><ellipse cx="11" cy="8" rx="6" ry="6"/></svg>1.5
        </button>
        <button class="btn-w" data-val="2" onclick="setWidth(this)">
          <svg viewBox="0 0 22 16"><ellipse cx="11" cy="8" rx="7" ry="7"/></svg>2.0
        </button>
        <button class="btn-w" data-val="2.5" onclick="setWidth(this)">
          <svg viewBox="-1 -1 24 18"><ellipse cx="11" cy="8" rx="9" ry="9"/></svg>2.5
        </button>
        <button class="btn-w" data-val="3" onclick="setWidth(this)">
          <svg viewBox="-2 -2 26 20"><ellipse cx="11" cy="8" rx="11" ry="11"/></svg>3.0
        </button>
        <button class="btn-w" data-val="4x2" onclick="setWidth(this)">
          <svg viewBox="-1 0 24 16"><ellipse cx="11" cy="8" rx="11" ry="6"/></svg>4.0
        </button>
        <button class="btn-w" data-val="5x2" onclick="setWidth(this)">
          <svg viewBox="-1 0 24 16"><ellipse cx="11" cy="8" rx="11" ry="6"/></svg>5.0
        </button>
        <button class="btn-w" data-val="6" onclick="setWidth(this)" id="width-6-btn">
          <svg viewBox="0 0 22 16"><rect x="2" y="4" width="18" height="8" rx="2" ry="2"/></svg>6.0
        </button>
      </div>
    </div>

    <!-- 号数 -->
    <div class="sec">
      <div class="sec-label">Ring Size — 号数</div>
      <div class="size-row" id="size-group">
        <!-- Silver用: 2ボタン -->
        <button class="btn-s silver-size active" data-val="1-20"  onclick="setSize(this)">1〜20号</button>
        <button class="btn-s silver-size"        data-val="21up"  onclick="setSize(this)">21号〜</button>
        <!-- 他素材用: 5ボタン -->
        <button class="btn-s other-size" data-val="1-8"   onclick="setSize(this)" style="display:none">1〜8号</button>
        <button class="btn-s other-size" data-val="9-16"  onclick="setSize(this)" style="display:none">9〜16号</button>
        <button class="btn-s other-size" data-val="17-24" onclick="setSize(this)" style="display:none">17〜24号</button>
        <button class="btn-s other-size" data-val="25-32" onclick="setSize(this)" style="display:none">25〜32号</button>
        <button class="btn-s other-size" data-val="33-40" onclick="setSize(this)" style="display:none">33〜40号</button>
      </div>
    </div>

    <!-- オプション -->
    <div class="sec">
      <div class="sec-label">Option — オプション</div>
      <div class="opts">

        <!-- つや加工 -->
        <div class="opt-row">
          <div><div class="opt-name">つや加工</div><div class="opt-note">¥1,100</div></div>
          <label class="toggle-wrap">
            <input type="checkbox" id="gloss-toggle" onchange="calc()">
            <span class="toggle-slider"></span>
          </label>
        </div>

        <!-- 沖縄彫刻 -->
        <div class="opt-row">
          <div><div class="opt-name">手彫り加工</div><div class="opt-note">3.0mm以上</div></div>
          <label class="toggle-wrap">
            <input type="checkbox" id="carving-toggle" onchange="onCarvingToggle()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="accordion-sub" id="carving-scope-sub">
          <div class="sub-row" style="flex-direction:column;align-items:flex-start;gap:5px;padding-top:3px;">
            <span class="sub-label">彫り範囲</span>
            <div class="radio-group" id="scope-group" style="width:100%;">
              <button class="radio-btn active" data-val="full"  onclick="setScope(this)">Full 360°</button>
              <button class="radio-btn"        data-val="half"  onclick="setScope(this)">Half 180°</button>
              <button class="radio-btn"        data-val="point" onclick="setScope(this)">Point チャーム</button>
            </div>
          </div>
        </div>
        <div class="accordion-sub" id="charm-sub">
          <div class="sub-row">
            <div><span class="sub-label">チャーム追加</span><div style="font-size:9px;color:var(--soft);">¥11,000 / 個</div></div>
            <div class="counter">
              <button class="counter-btn" onclick="change('charm',-1)">−</button>
              <div class="counter-val" id="val-charm">0</div>
              <button class="counter-btn" onclick="change('charm',1)">＋</button>
            </div>
          </div>
        </div>
        <div class="accordion-sub" id="carving-sub">
          <div class="sub-row" style="flex-direction:column;align-items:flex-start;gap:5px;">
            <span class="sub-label">納期</span>
            <div class="del-row" id="delivery-group" style="width:100%;padding:0;">
              <button class="btn-del active" data-val="normal" onclick="setDel(this)">通常納品<span class="del-note">約3週間</span></button>
              <button class="btn-del"        data-val="7day"   onclick="setDel(this)">7日後<span class="del-note">+¥22,000</span></button>
              <button class="btn-del"        data-val="3day"   onclick="setDel(this)">3日後<span class="del-note">+¥44,000</span></button>
            </div>
          </div>
        </div>

        <!-- ダイヤモンド -->
        <div class="opt-row">
          <div><div class="opt-name">ダイヤモンド</div><div class="opt-note">¥11,000 / 石</div></div>
          <div class="counter">
            <button class="counter-btn" onclick="change('stone',-1)">−</button>
            <div class="counter-val" id="val-stone">0</div>
            <button class="counter-btn" onclick="change('stone',1)">＋</button>
          </div>
        </div>

        <!-- 刻印 -->
        <div class="opt-row" style="border-bottom:none">
          <div><div class="opt-name">刻印</div><div class="opt-note">¥220 / 文字</div></div>
          <div class="counter">
            <button class="counter-btn" onclick="change('stamp',-1)">−</button>
            <div class="counter-val" id="val-stamp">0</div>
            <button class="counter-btn" onclick="change('stamp',1)">＋</button>
          </div>
        </div>

      </div>
    </div>

  </div><!-- /scroll-area -->

  <!-- 固定フッター: 結果 -->
  <div id="footer">
    <div id="price-loading">価格を読み込み中…</div>
    <div id="result-rows" class="res-rows">
      <div class="res-row">
        <span>基本料金<span id="r-base-subtitle" style="margin-left:5px;font-size:9px;color:var(--soft);"></span></span>
        <span id="r-base">—</span>
      </div>
      <div id="r-product-num-row" class="res-row" style="display:none">
        <span id="r-product-num" style="font-size:10px;color:var(--soft);"></span><span></span>
      </div>
      <div class="res-row" id="row-gloss"    style="display:none"><span>つや加工</span><span id="r-gloss">¥1,100</span></div>
      <div class="res-row" id="row-carving"  style="display:none"><span id="lbl-carving">沖縄彫刻（全周）</span><span id="r-carving">—</span></div>
      <div class="res-row" id="row-stone"    style="display:none"><span id="lbl-stone">ダイヤモンド</span><span id="r-stone">—</span></div>
      <div class="res-row" id="row-stamp"    style="display:none"><span id="lbl-stamp">刻印</span><span id="r-stamp">—</span></div>
      <div class="res-row" id="row-charm"    style="display:none"><span id="lbl-charm">チャーム</span><span id="r-charm">—</span></div>
      <div class="res-row" id="row-delivery" style="display:none"><span id="lbl-del">—</span><span id="r-delivery">—</span></div>
      <div class="res-row total"><span>合計（税込）</span><span id="r-total">—</span></div>
    </div>
    <div id="sheet-status"></div>
  </div>

</div><!-- /app -->

<script>
// ============================================================
// Google スプレッドシート連携 — Price_Num シートのみ使用
// ============================================================
// GAS中継URL（スプレッドシートIDは非公開・GASのデプロイURLのみ記載）
// GASをデプロイ後、発行されたURLをここに貼り付けてください
const GAS_URL = "https://script.google.com/macros/s/AKfycbzLruhDOLbk-JR_hfozomMc7jfZe3ypsmhN_fyu-hhqnRVdujOR3i4rNwwPJj1umAmq0w/exec";

const MAT_MAP = {
  "silver925":"silver","silver":"silver","Silver":"silver","SV925":"silver","sv925":"silver",
  "10k":"10K","10K":"10K","K10":"10K","k10":"10K","Gold K10":"10K","gold k10":"10K","gold10k":"10K","Gold10K":"10K",
  "18k":"18K","18K":"18K","K18":"18K","k18":"18K","Gold K18":"18K","gold k18":"18K","gold18k":"18K","Gold18K":"18K",
  "pt900":"pt","pt":"pt","Pt900":"pt","PT900":"pt","platinum":"pt","Platinum":"pt","Pt":"pt","PT":"pt","pt900":"pt","Pt900":"pt"
};

let productNameMap = {};

// 商品番号体系（RAVINA_Price_List_-_Price_Num.pdf に整合）:
// 商品番号 = "11" + 素材コード(2桁) + 幅コード(2桁) + 号数グループコード(2桁)
// 素材: silver=01, 10K=02, 18K=03, pt=04
// 幅:   1.0=01, 1.5=02, 2.0=03, 2.5=04, 3.0=05, 4x2=06, 5x2=07, 6.0=08
// 号数: silver「1-20」=01,「20up」=02 / その他「1-8」=03,「9-16」=04,「17-24」=05,「25-32」=06,「33-40」=07
let productNumMap = {
  "silver":{
    "1-20": {"1":11010101,"1.5":11010201,"2":11010301,"2.5":11010401,"3":11010501,"4x2":11010601,"5x2":11010701,"6":11010801},
    "21up": {"1":11010102,"1.5":11010202,"2":11010302,"2.5":11010402,"3":11010502,"4x2":11010602,"5x2":11010702,"6":11010802}
  },

let mat = "silver", del = "normal", scope = "none";

// ─── UI helpers ───
function fmt(n){ return "¥" + Math.round(n).toLocaleString("ja-JP"); }

function setMat(el){
  document.querySelectorAll("#material-group .btn-mat").forEach(b=>b.classList.remove("active"));
  el.classList.add("active"); mat = el.dataset.val;

  // K10/K18/Pt900は6.0mmのデータがないため選択不可にする
  const sixBtn = document.getElementById("width-6-btn");
  if (sixBtn) {
    const isSilver = mat === "silver";
    sixBtn.classList.toggle("disabled", !isSilver);
    if (!isSilver && sixBtn.classList.contains("active")) {
      sixBtn.classList.remove("active");
      const fallback = document.querySelector('#width-group .btn-w[data-val="5x2"]');
      if (fallback) fallback.classList.add("active");
    }
  }

  updateSizeButtons(mat);
  calc();
}

function updateSizeButtons(currentMat){
  const sizeRow = document.getElementById("size-group");
  const silverBtns = sizeRow.querySelectorAll(".silver-size");
  const otherBtns  = sizeRow.querySelectorAll(".other-size");

  if(currentMat === "silver"){
    sizeRow.classList.remove("other-mat");
    silverBtns.forEach(b => b.style.display = "");
    otherBtns.forEach(b  => { b.style.display = "none"; b.classList.remove("active"); });
    // アクティブが他素材用だったらSilver先頭に戻す
    const hasActive = [...silverBtns].some(b => b.classList.contains("active"));
    if(!hasActive){
      silverBtns.forEach((b,i) => b.classList.toggle("active", i===0));
    }
  } else {
    sizeRow.classList.add("other-mat");
    silverBtns.forEach(b => { b.style.display = "none"; b.classList.remove("active"); });
    otherBtns.forEach(b  => b.style.display = "");
    // アクティブがSilver用だったら他素材先頭に戻す
    const hasActive = [...otherBtns].some(b => b.classList.contains("active"));
    if(!hasActive){
      otherBtns.forEach((b,i) => b.classList.toggle("active", i===0));
    }
  }
}
function setWidth(el){
  document.querySelectorAll("#width-group .btn-w").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  const w = el.dataset.val;
  const carvable = CARVABLE_WIDTHS.includes(w);

}

function onCarvingToggle(){
  const on = document.getElementById("carving-toggle").checked;
  const scopeSub = document.getElementById("carving-scope-sub");
  if(on){
    scopeSub.classList.add("open");
    scope = "full";
    document.querySelectorAll("#scope-group .radio-btn").forEach(b=>b.classList.remove("active"));
    const fullBtn = document.querySelector("#scope-group .radio-btn[data-val='full']");
    if(fullBtn) fullBtn.classList.add("active");

    scopeSub.classList.remove("open");
    scope = "none";
    counts.charm = 0;
    document.getElementById("val-charm").textContent = 0;
    document.getElementById("charm-sub").classList.remove("open");
    del = "normal";

// ─── 計算 ───
function calc(){
  const widthEl = document.querySelector("#width-group .btn-w.active");
  const sizeEl  = document.querySelector("#size-group .btn-s.active");
  const width   = widthEl ? widthEl.dataset.val : "1";
  const size    = sizeEl  ? sizeEl.dataset.val  : "1-8";
  const carving = scope !== "none";

  const ringBase = (prices[mat]&&prices[mat][width]&&prices[mat][width][size]) || 0;
  let total = ringBase;

  // 商品名（スプレッドシートから: mat→width→size）
  const prodName = (productNameMap[mat]&&productNameMap[mat][width]&&productNameMap[mat][width][size])||null;
  document.getElementById("r-base-subtitle").textContent = prodName || "";
  document.getElementById("r-base").textContent = ringBase ? fmt(ringBase) : "—";

  // 商品番号（スプレッドシートから: mat→size→width）
  const pNum = (productNumMap[mat]&&productNumMap[mat][size]&&productNumMap[mat][size][width])||null;
  if(pNum){
    document.getElementById("r-product-num").textContent = "商品番号："+pNum;
    document.getElementById("r-product-num-row").style.display="flex";
  } else {
    document.getElementById("r-product-num-row").style.display="none";
  }

  // つや加工
  const glossOn = document.getElementById("gloss-toggle").checked;
  if(glossOn){ total+=1100; document.getElementById("row-gloss").style.display="flex"; }
  else { document.getElementById("row-gloss").style.display="none"; }

  // 彫刻
  if(carving){
    const fullFee = (carvingPrices[mat]&&carvingPrices[mat][size]&&carvingPrices[mat][size][width])
      ? carvingPrices[mat][size][width] : 0;
    let fee, label;
    if(scope==="half"){
      fee = Math.round(fullFee/2); label = "沖縄彫刻（半周）";
    } else if(scope==="point"){
      fee = counts.charm*11000; label = `沖縄彫刻（チャーム×${counts.charm}）`;
    } else {
      fee = fullFee; label = "沖縄彫刻（全周）";
    }
    total += fee;
    document.getElementById("lbl-carving").textContent = label;
    document.getElementById("r-carving").textContent   = fmt(fee);
    document.getElementById("row-carving").style.display = "flex";
  } else {
    document.getElementById("row-carving").style.display = "none";
  }

  // 石留め
  if(counts.stone>0){
    const s=counts.stone*11000; total+=s;
    document.getElementById("lbl-stone").textContent = `ダイヤモンド×${counts.stone}`;
    document.getElementById("r-stone").textContent   = fmt(s);
    document.getElementById("row-stone").style.display="flex";
  } else { document.getElementById("row-stone").style.display="none"; }

  // 刻印
  if(counts.stamp>0){
    const s=counts.stamp*220; total+=s;
    document.getElementById("lbl-stamp").textContent = `刻印×${counts.stamp}文字`;
    document.getElementById("r-stamp").textContent   = fmt(s);
    document.getElementById("row-stamp").style.display="flex";
  } else { document.getElementById("row-stamp").style.display="none"; }

  // チャーム（point以外）
  if(scope==="point"){
    document.getElementById("row-charm").style.display="none";
  } else if(counts.charm>0){
    const c=counts.charm*11000; total+=c;
    document.getElementById("lbl-charm").textContent=`チャーム×${counts.charm}`;
    document.getElementById("r-charm").textContent=fmt(c);
    document.getElementById("row-charm").style.display="flex";
  } else { document.getElementById("row-charm").style.display="none"; }

  // 納期
  if(del==="7day"){
    document.getElementById("row-delivery").style.display="flex";
    document.getElementById("lbl-del").textContent="速納（7日後）";
    document.getElementById("r-delivery").textContent="+¥22,000";
    total+=22000;
  } else if(del==="3day"){
    document.getElementById("row-delivery").style.display="flex";
    document.getElementById("lbl-del").textContent="速納（3日後）";
    document.getElementById("r-delivery").textContent="+¥44,000";
    total+=44000;
  } else {
    document.getElementById("row-delivery").style.display="none";
  }

  document.getElementById("r-total").textContent = total ? fmt(total) : "—";
}

// ─── GAS経由でPrice_NumシートのCSVを取得 ───
async function loadCSV(){
  if (!GAS_URL || GAS_URL === "YOUR_GAS_DEPLOY_URL_HERE") {
    throw new Error("GAS_URLが未設定です。GASをデプロイしてURLを設定してください。");
  }
  console.log("[RAVINA] GAS fetch:", GAS_URL);
  const res = await fetch(GAS_URL, { cache: "no-store" });
  console.log("[RAVINA] status:", res.status);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const text = await res.text();
  if(text.trim().startsWith("ERROR:")) throw new Error(text.trim());
  console.log("[RAVINA] CSV先頭300字:", text.slice(0,300));
  return parseCSV(text);
}
function parseCSV(text){
  const rows=[]; let cur="",inQ=false,row=[];
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    if(inQ){ if(ch==='"'&&text[i+1]==='"'){cur+='"';i++;} else if(ch==='"')inQ=false; else cur+=ch; }
    else { if(ch==='"'){inQ=true;} else if(ch===','){row.push(cur.trim());cur="";} else if(ch==='\n'){row.push(cur.trim());if(row.some(c=>c!==""))rows.push(row);row=[];cur="";} else if(ch!=='\r')cur+=ch; }
  }
  if(cur!==""||row.length>0){row.push(cur.trim());if(row.some(c=>c!==""))rows.push(row);}
  return rows;
}
function toNum(v){ if(!v&&v!==0)return 0; return Number(String(v).replace(/[^0-9.-]/g,""))||0; }
function normalizeMat(rawMat){
  const s = String(rawMat).trim();
  if(!s) return s;
  const lc = s.toLowerCase().replace(/\s+/g,"");

  // 完全一致（大文字小文字・スペース無視）
  for(const[k,v] of Object.entries(MAT_MAP)){
    if(k.toLowerCase().replace(/\s+/g,"") === lc) return v;
  }
  // すでにMAP値と一致
  if(Object.values(MAT_MAP).includes(s)) return s;

  // 部分一致フォールバック
  if(lc.includes("silver") || lc.includes("sv")) return "silver";
  if(lc.includes("k10") || lc.includes("10k")) return "10K";
  if(lc.includes("k18") || lc.includes("18k")) return "18K";
  if(lc.includes("pt") || lc.includes("platinum")) return "pt";

  return s;
}
function parsePriceNumSheet(rows){
  if(!rows||rows.length<2){ console.log("[RAVINA] rows空"); return null; }

  // ── シート構造（確定）──
  // 1行目 = ヘッダー: shop / material / list / width / size / 商品名 / price / (空) / no.shop / no.list / no.material / no.width / no.size / 商品番号 / (空) / CSV用_商品名
  // 2行目〜 = データ行
  const hdr = rows[0].map(h => String(h).trim());
  console.log("[RAVINA] ヘッダー:", hdr);
  console.log("[RAVINA] 総行数(ヘッダー含む):", rows.length);
  // データ行のサンプル（最初の5行）
  for(let dbg=1; dbg<=Math.min(5,rows.length-1); dbg++){
    console.log(`[RAVINA] row${dbg}:`, rows[dbg]);
  }

  const col = name => hdr.findIndex(h => h === name);
  const colRe = re => hdr.findIndex(h => re.test(h));

  const im   = col("material");
  const iw   = col("width");
  const is_  = col("size");
  const il   = col("list");
  const ipr  = colRe(/^price$/i);
  const ipn  = col("商品番号");
  const inam = col("商品名");

  console.log("[RAVINA] 列インデックス material="+im+" width="+iw+" size="+is_+" list="+il+" price="+ipr+" 商品番号="+ipn+" 商品名="+inam);

  // width値 → キー変換（"1.0" → "1"、"4x2" はそのまま）
  const toWKey = r => {
    const s = String(r).trim().replace(/×/g,"x").replace(/mm$/i,"");
    if(s==="4x2"||s==="5x2") return s;
    const n = parseFloat(s);
    return isNaN(n) ? null : String(n);
  };
  // size値 → キー変換
  // "1-8号" → "1-8"、"1〜8号" → "1-8"、"21号〜" → "21up"、"21号以上" → "21up"
  const toSzKey = r => {
    let s = String(r).trim();
    // "21号〜"系 → "21up"（スプレ変更後）、旧"20号〜"も念のため対応
    if(/21[号号]?[~〜上]/.test(s) || /21[~〜]/.test(s)) return "21up";
    if(/20[号号]?[~〜上]/.test(s) || /20[~〜]/.test(s)) return "21up";
    // 〜 を - に統一、号・スペース除去
    s = s.replace(/[〜~]/g,"-").replace(/[号号]/g,"").replace(/\s/g,"").trim();
    // "1-20" → そのまま
    return s || null;
  };

  const pnumMap={}, newPrices={}, productNameMap={};
  let priceCount=0;
  let skippedList=0, skippedMat=0, skippedKey=0;

  for(let i=1; i<rows.length; i++){
    const v = rows[i];
    if(!v||!v.length) continue;

    // list列が存在し、値が空でなく "Ring" でも "ring" でもない行はスキップ
    // ※ list列が存在しない(il<0)か、値が空("")の場合はスキップしない
    if(il>=0){
      const lt = String(v[il]||"").trim();
      if(lt !== "" && lt.toLowerCase()!=="ring"){
        skippedList++;
        continue;
      }
    }

    const rawMat = String(v[im]||"").trim();
    const mt = normalizeMat(rawMat);
    if(!Object.values(MAT_MAP).includes(mt)){
      if(rawMat) skippedMat++;
      continue;
    }

    const rawW = String(v[iw]||"").trim();
    const rawS = String(v[is_]||"").trim();
    const wk = toWKey(rawW);
    const sz = toSzKey(rawS);
    if(!wk||!sz){ skippedKey++; continue; }

    // 商品番号（スプレッドシートの値をそのまま使用）
    if(ipn>=0 && v[ipn]!=null && String(v[ipn]).trim()!==""){
      if(!pnumMap[mt])     pnumMap[mt]={};
      if(!pnumMap[mt][sz]) pnumMap[mt][sz]={};
      pnumMap[mt][sz][wk] = String(v[ipn]).trim();
    }

    // 商品名
    if(inam>=0 && v[inam]!=null && String(v[inam]).trim()!==""){
      if(!productNameMap[mt])     productNameMap[mt]={};
      if(!productNameMap[mt][wk]) productNameMap[mt][wk]={};
      productNameMap[mt][wk][sz] = String(v[inam]).trim();
    }

    // 価格（"¥3,850" 形式 → 数値）
    if(ipr>=0 && v[ipr]!=null && String(v[ipr]).trim()!==""){
      const p = toNum(v[ipr]);
      if(p>0){
        if(!newPrices[mt])     newPrices[mt]={};
        if(!newPrices[mt][wk]) newPrices[mt][wk]={};
        newPrices[mt][wk][sz] = p;
        priceCount++;
      }
    }
  }
  console.log("[RAVINA] 価格件数:", priceCount,
    "| スキップ(list):", skippedList,
    "| スキップ(material):", skippedMat,
    "| スキップ(key):", skippedKey);
  console.log("[RAVINA] silver/1/1-20 price:", newPrices?.silver?.["1"]?.["1-20"]);
  console.log("[RAVINA] 10K/1/1-8 price:", newPrices?.["10K"]?.["1"]?.["1-8"]);
  console.log("[RAVINA] 18K/1/1-8 price:", newPrices?.["18K"]?.["1"]?.["1-8"]);
  console.log("[RAVINA] pt/1/1-8 price:", newPrices?.["pt"]?.["1"]?.["1-8"]);
  console.log("[RAVINA] pnumMap keys:", Object.keys(pnumMap));
  console.log("[RAVINA] productNameMap keys:", Object.keys(productNameMap));
  console.log("[RAVINA] 10K pnumMap sample:", pnumMap?.["10K"]?.["1-8"]?.["1"]);
  console.log("[RAVINA] 10K productName sample:", productNameMap?.["10K"]?.["1"]?.["1-8"]);
  return { pnumMap, newPrices, productNameMap };
}

async function initPrices(){
  document.getElementById("price-loading").style.display="block";
  try{
    const rows   = await loadCSV();
    const result = parsePriceNumSheet(rows);
    if(result){
      if(Object.keys(result.newPrices).length>0)     { prices=result.newPrices;           console.log("[RAVINA] prices更新OK:", Object.keys(result.newPrices)); }
      else { console.warn("[RAVINA] prices空 → フォールバック価格を使用"); }
      if(Object.keys(result.pnumMap).length>0)        { productNumMap=result.pnumMap; console.log("[RAVINA] pnumMap更新OK:", Object.keys(result.pnumMap)); }
      else { console.warn("[RAVINA] pnumMap空"); }
      if(result.productNameMap && Object.keys(result.productNameMap).length>0) { productNameMap=result.productNameMap; console.log("[RAVINA] productNameMap更新OK:", Object.keys(result.productNameMap)); }
      else { console.warn("[RAVINA] productNameMap空"); }
    }
    document.getElementById("price-loading").style.display="none";
    showStatus("ok");
  }catch(e){
    console.error("[RAVINA] initPricesエラー:", e);
    document.getElementById("price-loading").style.display="none";
    showStatus("error");
  }
  calc();
}
function showStatus(st){
  const el=document.getElementById("sheet-status");
  if(st==="ok"){el.textContent="✓ 最新価格";el.style.color="#6a9a6a";}
  else{el.textContent="⚠ オフライン価格";el.style.color="#c07a4a";}
  el.style.display="block";
}

// ─── 初期化 ───
initPrices();
// 1.0mm初期 → 彫刻トグル無効
(function(){
  const t=document.getElementById("carving-toggle");
  const w=t?t.closest(".toggle-wrap"):null;
  if(w){w.style.opacity="0.35";w.style.pointerEvents="none";}
})();
</script>
