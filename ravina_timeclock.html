<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RAVINA 打刻</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
  background: #f5f4f0; color: #1a1a1a;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 2rem 1rem;
}
.logo   { font-size: 11px; letter-spacing: 0.4em; color: #999; margin-bottom: 0.4rem; }
.title  { font-size: 20px; font-weight: 500; letter-spacing: 0.1em; margin-bottom: 0.25rem; color: #1a1a1a; }
.clock  { font-size: 12px; color: #888; letter-spacing: 0.05em; margin-bottom: 2rem; }

.card {
  width: 100%; max-width: 420px;
  background: #ffffff; border: 0.5px solid #e0ddd8; border-radius: 12px;
  padding: 1rem 1.25rem; display: flex; align-items: center; gap: 14px;
}
.card + .card { margin-top: 8px; }

.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: #f0ede8; border: 0.5px solid #d8d4ce;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; color: #888; flex-shrink: 0;
}
.avatar.in  { background: #e8f5ee; border-color: #7ec89a; color: #2d7a50; }
.avatar.out { background: #fdf0eb; border-color: #f0a07a; color: #b05030; }

.info  { flex: 1; min-width: 0; }
.name  { font-size: 15px; font-weight: 500; color: #1a1a1a; }
.times { font-size: 11px; color: #aaa; margin-top: 3px; }
.times .ci { color: #2d7a50; }
.times .co { color: #b05030; }

.btns { display: flex; gap: 6px; flex-shrink: 0; }

.btn {
  padding: 7px 14px; border-radius: 8px; border: none;
  font-size: 12px; letter-spacing: 0.08em; cursor: pointer;
  transition: all 0.15s; font-family: inherit; font-weight: 500;
}
.btn-in  { background: #3a9e68; color: #fff; }
.btn-in:hover  { background: #2d8558; }
.btn-out { background: #e07048; color: #fff; }
.btn-out:hover { background: #c55e38; }
.btn:disabled  { background: #e8e6e2; color: #bbb; cursor: not-allowed; }

#toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: #fff; border: 0.5px solid #ddd;
  border-radius: 10px; padding: 12px 20px;
  font-size: 13px; opacity: 0; transition: all 0.25s;
  pointer-events: none; white-space: nowrap; z-index: 100; color: #1a1a1a;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok  { border-color: #7ec89a; color: #2d7a50; }
#toast.err { border-color: #f09090; color: #a33030; }

.loading {
  position: fixed; inset: 0; background: rgba(255,255,255,0.65);
  display: flex; align-items: center; justify-content: center; z-index: 50;
}
.loading.hidden { display: none; }
.spinner {
  width: 24px; height: 24px; border: 2px solid #e0ddd8;
  border-top-color: #3a9e68; border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="logo">RAVINA Staff</div>
<div class="title">打刻システム</div>
<div class="clock" id="clock"></div>

<div class="card" id="card-島尻望鈴">
  <div class="avatar" id="av-島尻望鈴">島尻</div>
  <div class="info">
    <div class="name">島尻望鈴</div>
    <div class="times" id="times-島尻望鈴">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-島尻望鈴"  onclick="stamp('島尻望鈴','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-島尻望鈴" onclick="stamp('島尻望鈴','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-田崎ゆめ乃">
  <div class="avatar" id="av-田崎ゆめ乃">田崎</div>
  <div class="info">
    <div class="name">田崎ゆめ乃</div>
    <div class="times" id="times-田崎ゆめ乃">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-田崎ゆめ乃"  onclick="stamp('田崎ゆめ乃','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-田崎ゆめ乃" onclick="stamp('田崎ゆめ乃','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-末次友理">
  <div class="avatar" id="av-末次友理">末次</div>
  <div class="info">
    <div class="name">末次友理</div>
    <div class="times" id="times-末次友理">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-末次友理"  onclick="stamp('末次友理','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-末次友理" onclick="stamp('末次友理','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-當山和乃">
  <div class="avatar" id="av-當山和乃">當山</div>
  <div class="info">
    <div class="name">當山和乃</div>
    <div class="times" id="times-當山和乃">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-當山和乃"  onclick="stamp('當山和乃','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-當山和乃" onclick="stamp('當山和乃','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-又吉夏奈">
  <div class="avatar" id="av-又吉夏奈">又吉</div>
  <div class="info">
    <div class="name">又吉夏奈</div>
    <div class="times" id="times-又吉夏奈">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-又吉夏奈"  onclick="stamp('又吉夏奈','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-又吉夏奈" onclick="stamp('又吉夏奈','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-遠本優花">
  <div class="avatar" id="av-遠本優花">遠本</div>
  <div class="info">
    <div class="name">遠本優花</div>
    <div class="times" id="times-遠本優花">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-遠本優花"  onclick="stamp('遠本優花','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-遠本優花" onclick="stamp('遠本優花','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="loading hidden" id="loading"><div class="spinner"></div></div>
<div id="toast"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwss9pIlM7COf_LWF4rnPhQkzO5Qn1sWUXsUC2MkTPB3JV5y9mUJ__6JOKmpQCKwXGjzg/exec";

const state = {};
["島尻望鈴","田崎ゆめ乃","末次友理","當山和乃","又吉夏奈","遠本優花"].forEach(n => {
  state[n] = { clockIn: "", clockOut: "" };
});

function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleString("ja-JP", { year:"numeric", month:"long", day:"numeric",
      weekday:"short", hour:"2-digit", minute:"2-digit", second:"2-digit" });
}
setInterval(updateClock, 1000);
updateClock();

function updateCard(name) {
  const s  = state[name];
  const av = document.getElementById("av-" + name);
  const tm = document.getElementById("times-" + name);
  const bi = document.getElementById("btn-in-"  + name);
  const bo = document.getElementById("btn-out-" + name);

  let timeTxt = "";
  if (s.clockIn)  timeTxt += `<span class="ci">出勤 ${s.clockIn}</span>`;
  if (s.clockOut) timeTxt += ` <span class="co">退勤 ${s.clockOut}</span>`;
  tm.innerHTML = timeTxt || "未打刻";

  if (!s.clockIn) {
    av.className = "avatar";
    bi.disabled = false;
    bo.disabled = true;
  } else if (!s.clockOut) {
    av.className = "avatar in";
    bi.disabled = true;
    bo.disabled = false;
  } else {
    av.className = "avatar out";
    bi.disabled = true;
    bo.disabled = true;
  }
}

async function stamp(name, type) {
  document.getElementById("loading").classList.remove("hidden");
  const now = new Date();
  const t   = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");

  try {
    const res = await callGAS({ action:"stamp", name, type, time:t });
    if (res.status === "ok") {
      if (type === "出勤") state[name].clockIn  = t;
      else                  state[name].clockOut = t;
      updateCard(name);
      toast(name + " — " + type + " " + t, "ok");
    } else {
      toast("エラー: " + (res.message || "不明"), "err");
    }
  } catch(e) {
    toast("通信エラー。再度お試しください", "err");
  }
  document.getElementById("loading").classList.add("hidden");
}

function callGAS(params) {
  return new Promise((resolve, reject) => {
    const cb  = "cb_" + Date.now();
    const scr = document.createElement("script");
    const tmr = setTimeout(() => {
      cleanup(); reject(new Error("timeout"));
    }, 15000);
    const cleanup = () => {
      delete window[cb];
      if (scr.parentNode) scr.parentNode.removeChild(scr);
      clearTimeout(tmr);
    };
    window[cb] = data => { cleanup(); resolve(data); };
    scr.onerror = () => { cleanup(); reject(new Error("load error")); };
    scr.src = GAS_URL + "?" + new URLSearchParams({ ...params, callback: cb });
    document.head.appendChild(scr);
  });
}

function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show " + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ""; }, 3500);
}

function parseTime(val) {
  if (!val) return "";
  if (typeof val === "object" && typeof val.getHours === "function") {
    return val.getHours().toString().padStart(2,"0") + ":" + val.getMinutes().toString().padStart(2,"0");
  }
  const s = String(val).trim();
  return /^\d{1,2}:\d{2}$/.test(s) ? s : "";
}

async function syncFromSheet() {
  try {
    const res = await callGAS({ action:"getToday" });
    if (res.status === "ok" && res.data) {
      res.data.forEach(row => {
        if (!state[row.name]) return;
        const ci = parseTime(row.clockIn);
        const co = parseTime(row.clockOut);
        state[row.name].clockIn  = ci;
        state[row.name].clockOut = co;
        updateCard(row.name);
      });
    }
  } catch(e) { /* サイレント失敗 */ }
}

syncFromSheet();
setInterval(syncFromSheet, 30000);
</script>
</body>
</html>
