<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RAVINA 打刻</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
  background: #0d0d0d; color: #f0ede8;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 2rem 1rem;
}
.logo   { font-size: 11px; letter-spacing: 0.4em; color: #b8a48a; margin-bottom: 0.5rem; }
.title  { font-size: 20px; font-weight: 300; letter-spacing: 0.1em; margin-bottom: 0.25rem; }
.clock  { font-size: 12px; color: #666; letter-spacing: 0.05em; margin-bottom: 2rem; }

.card {
  width: 100%; max-width: 400px;
  background: #141414; border: 0.5px solid #2a2a2a; border-radius: 12px;
  padding: 1.25rem 1.5rem; display: flex; align-items: center; gap: 14px;
}
.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: #1e1e1e; border: 0.5px solid #333;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #b8a48a; flex-shrink: 0;
}
.avatar.in  { background: #0d1f16; border-color: #3a7a55; color: #5aba7e; }
.avatar.out { background: #1f140d; border-color: #7a553a; color: #ba7e5a; }

.info  { flex: 1; }
.name  { font-size: 15px; font-weight: 400; }
.times { font-size: 11px; color: #555; margin-top: 3px; }
.times .ci { color: #5aba7e; }
.times .co { color: #ba7e5a; }

.btns { display: flex; gap: 6px; flex-shrink: 0; }
.btn {
  padding: 8px 14px; border-radius: 8px; border: 0.5px solid #3a3a3a;
  background: transparent; color: #f0ede8; font-size: 12px;
  letter-spacing: 0.08em; cursor: pointer; transition: all 0.15s;
  font-family: inherit;
}
.btn-in  { border-color: #3a7a55; color: #5aba7e; }
.btn-in:hover  { background: #0d1f16; }
.btn-out { border-color: #7a553a; color: #ba7e5a; }
.btn-out:hover { background: #1f140d; }
.btn:disabled  { opacity: 0.25; cursor: not-allowed; }

#toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: #1e1e1e; border: 0.5px solid #444;
  border-radius: 10px; padding: 12px 20px;
  font-size: 13px; opacity: 0; transition: all 0.25s;
  pointer-events: none; white-space: nowrap; z-index: 100;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.ok  { border-color: #3a7a55; color: #5aba7e; }
#toast.err { border-color: #7a3a3a; color: #ba5a5a; }

.loading {
  position: fixed; inset: 0; background: rgba(13,13,13,0.7);
  display: flex; align-items: center; justify-content: center; z-index: 50;
}
.loading.hidden { display: none; }
.spinner {
  width: 24px; height: 24px; border: 2px solid #2a2a2a;
  border-top-color: #b8a48a; border-radius: 50%;
  animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="logo">RAVINA Staff</div>
<div class="title">打刻システム</div>
<div class="clock" id="clock"></div>

<div class="card" id="card-島尻望鈴">
  <div class="avatar" id="av-島尻望鈴">島尻</div>
  <div class="info">
    <div class="name">島尻望鈴</div>
    <div class="times" id="times-島尻望鈴">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-島尻望鈴"  onclick="stamp('島尻望鈴','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-島尻望鈴" onclick="stamp('島尻望鈴','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-田崎ゆめ乃" style="margin-top:8px;">
  <div class="avatar" id="av-田崎ゆめ乃">田崎</div>
  <div class="info">
    <div class="name">田崎ゆめ乃</div>
    <div class="times" id="times-田崎ゆめ乃">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-田崎ゆめ乃"  onclick="stamp('田崎ゆめ乃','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-田崎ゆめ乃" onclick="stamp('田崎ゆめ乃','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-末次友理" style="margin-top:8px;">
  <div class="avatar" id="av-末次友理">末次</div>
  <div class="info">
    <div class="name">末次友理</div>
    <div class="times" id="times-末次友理">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-末次友理"  onclick="stamp('末次友理','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-末次友理" onclick="stamp('末次友理','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-當山和乃" style="margin-top:8px;">
  <div class="avatar" id="av-當山和乃">當山</div>
  <div class="info">
    <div class="name">當山和乃</div>
    <div class="times" id="times-當山和乃">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-當山和乃"  onclick="stamp('當山和乃','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-當山和乃" onclick="stamp('當山和乃','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-又吉夏奈" style="margin-top:8px;">
  <div class="avatar" id="av-又吉夏奈">又吉</div>
  <div class="info">
    <div class="name">又吉夏奈</div>
    <div class="times" id="times-又吉夏奈">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-又吉夏奈"  onclick="stamp('又吉夏奈','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-又吉夏奈" onclick="stamp('又吉夏奈','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="card" id="card-遠本優花" style="margin-top:8px;">
  <div class="avatar" id="av-遠本優花">遠本</div>
  <div class="info">
    <div class="name">遠本優花</div>
    <div class="times" id="times-遠本優花">未打刻</div>
  </div>
  <div class="btns">
    <button class="btn btn-in"  id="btn-in-遠本優花"  onclick="stamp('遠本優花','出勤')">出勤</button>
    <button class="btn btn-out" id="btn-out-遠本優花" onclick="stamp('遠本優花','退勤')" disabled>退勤</button>
  </div>
</div>

<div class="loading hidden" id="loading"><div class="spinner"></div></div>
<div id="toast"></div>

<script>
// ★ GASデプロイURLをここに貼る
const GAS_URL = "https://script.google.com/macros/s/AKfycbzNJdYQolzEMqPZJaAPGnW9bQGsuLygD0b1IUebdTWAQe6HeiyzUTcxWjnV246HukS2bg/exec";

// 各スタッフの状態
const state = {};
["島尻望鈴","田崎ゆめ乃","末次友理","當山和乃","又吉夏奈","遠本優花"].forEach(n => {
  state[n] = { clockIn: "", clockOut: "" };
});

// 時計
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleString("ja-JP", { year:"numeric", month:"long", day:"numeric",
      weekday:"short", hour:"2-digit", minute:"2-digit", second:"2-digit" });
}
setInterval(updateClock, 1000);
updateClock();

// 画面更新
function updateCard(name) {
  const s  = state[name];
  const av = document.getElementById("av-" + name);
  const tm = document.getElementById("times-" + name);
  const bi = document.getElementById("btn-in-"  + name);
  const bo = document.getElementById("btn-out-" + name);

  let timeTxt = "";
  if (s.clockIn)  timeTxt += `<span class="ci">出勤 ${s.clockIn}</span>`;
  if (s.clockOut) timeTxt += ` <span class="co">退勤 ${s.clockOut}</span>`;
  tm.innerHTML = timeTxt || "未打刻";

  if (!s.clockIn) {
    av.className = "avatar";
    bi.disabled = false;
    bo.disabled = true;
  } else if (!s.clockOut) {
    av.className = "avatar in";
    bi.disabled = true;
    bo.disabled = false;
  } else {
    av.className = "avatar out";
    bi.disabled = true;
    bo.disabled = true;
  }
}

// 打刻送信
async function stamp(name, type) {
  document.getElementById("loading").classList.remove("hidden");
  const now = new Date();
  const t   = now.getHours().toString().padStart(2,"0") + ":" + now.getMinutes().toString().padStart(2,"0");

  try {
    const res = await callGAS({ action:"stamp", name, type, time:t });
    if (res.status === "ok") {
      if (type === "出勤") state[name].clockIn  = t;
      else                  state[name].clockOut = t;
      updateCard(name);
      toast(name + " — " + type + " " + t, "ok");
    } else {
      toast("エラー: " + (res.message || "不明"), "err");
    }
  } catch(e) {
    toast("通信エラー。再度お試しください", "err");
  }
  document.getElementById("loading").classList.add("hidden");
}

// JSONP通信
function callGAS(params) {
  return new Promise((resolve, reject) => {
    const cb  = "cb_" + Date.now();
    const scr = document.createElement("script");
    const tmr = setTimeout(() => {
      cleanup(); reject(new Error("timeout"));
    }, 15000);
    const cleanup = () => {
      delete window[cb];
      if (scr.parentNode) scr.parentNode.removeChild(scr);
      clearTimeout(tmr);
    };
    window[cb] = data => { cleanup(); resolve(data); };
    scr.onerror = () => { cleanup(); reject(new Error("load error")); };
    scr.src = GAS_URL + "?" + new URLSearchParams({ ...params, callback: cb });
    document.head.appendChild(scr);
  });
}

// トースト
function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = "show " + type;
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.className = ""; }, 3500);
}

// 起動時に今日の状態を取得
(async () => {
  try {
    const res = await callGAS({ action:"getToday" });
    if (res.status === "ok" && res.data) {
      res.data.forEach(row => {
        if (!state[row.name]) return;
        if (/^\d{1,2}:\d{2}$/.test(row.clockIn  || "")) state[row.name].clockIn  = row.clockIn;
        if (/^\d{1,2}:\d{2}$/.test(row.clockOut || "")) state[row.name].clockOut = row.clockOut;
        updateCard(row.name);
      });
    }
  } catch(e) { /* サイレント失敗 */ }
})();
</script>
</body>
</html>
