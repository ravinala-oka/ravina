
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap { padding: 1.5rem 0; max-width: 680px; font-family: var(--font-sans); }
  .section-title {
    font-size: 11px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--color-text-secondary);
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .field-group { margin-bottom: 1.25rem; }
  .field-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; display: block; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  select { width: 100%; font-size: 14px; }
  .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-opt {
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-primary);
    border-radius: var(--border-radius-md);
    padding: 7px 14px; font-size: 13px; cursor: pointer;
    transition: all 0.15s ease; line-height: 1.5;
  }
  .btn-opt:hover { background: var(--color-background-secondary); }
  .btn-opt.active {
    background: var(--color-background-info);
    color: var(--color-text-info);
    border-color: transparent; font-weight: 500;
  }
  .option-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .option-row:last-child { border-bottom: none; }
  .option-name { font-size: 14px; }
  .option-price { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .counter { display: flex; align-items: center; }
  .counter-btn {
    width: 30px; height: 30px; border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary); color: var(--color-text-primary);
    font-size: 16px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: background 0.1s; line-height: 1;
  }
  .counter-btn:first-child { border-radius: var(--border-radius-md) 0 0 var(--border-radius-md); }
  .counter-btn:last-child { border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; }
  .counter-btn:hover { background: var(--color-background-secondary); }
  .counter-val {
    width: 36px; height: 30px; text-align: center; font-size: 14px; font-weight: 500;
    border-top: 0.5px solid var(--color-border-secondary);
    border-bottom: 0.5px solid var(--color-border-secondary);
    border-left: none; border-right: none;
    background: var(--color-background-primary); color: var(--color-text-primary);
    display: flex; align-items: center; justify-content: center;
  }
  .toggle-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .toggle-wrap { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: var(--color-border-secondary); border-radius: 22px;
    cursor: pointer; transition: background 0.2s;
  }
  .toggle-slider:before {
    content: ""; position: absolute; width: 16px; height: 16px;
    background: white; border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s;
  }
  .toggle-wrap input:checked + .toggle-slider { background: var(--color-text-info); }
  .toggle-wrap input:checked + .toggle-slider:before { transform: translateX(18px); }
  .carving-sub {
    overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s ease;
    max-height: 0; opacity: 0;
  }
  .carving-sub.open { max-height: 200px; opacity: 1; }
  .sub-option {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0 8px 16px; border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .sub-option:last-child { border-bottom: none; }
  .radio-btn-group { display: flex; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); overflow: hidden; }
  .radio-btn {
    flex: 1; padding: 6px 12px; font-size: 12px; cursor: pointer;
    background: var(--color-background-primary); color: var(--color-text-secondary);
    border: none; border-right: 0.5px solid var(--color-border-secondary);
    transition: all 0.15s; white-space: nowrap;
  }
  .radio-btn:last-child { border-right: none; }
  .radio-btn:hover { background: var(--color-background-secondary); }
  .radio-btn.active { background: var(--color-background-info); color: var(--color-text-info); font-weight: 500; }
  .result-card {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-lg);
    padding: 1.25rem 1.5rem; margin-top: 1.5rem;
    border: 0.5px solid var(--color-border-tertiary);
  }
  .result-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; font-size: 13px; color: var(--color-text-secondary);
    border-bottom: 0.5px solid var(--color-border-tertiary);
  }
  .result-row:last-child { border-bottom: none; }
  .result-row.total { font-size: 18px; font-weight: 500; color: var(--color-text-primary); padding-top: 10px; margin-top: 4px; }
  .divider { border: none; border-top: 0.5px solid var(--color-border-tertiary); margin: 1.25rem 0; }
  .header { margin-bottom: 1.5rem; }
  .header h2 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .header p { font-size: 13px; color: var(--color-text-secondary); }
  .indent-label { font-size: 13px; color: var(--color-text-secondary); }
</style>

<div class="wrap">
  <h2 class="sr-only">ハワイアン彫り指輪 料金計算フォーム</h2>
  <div class="header">
    <h2>指輪彫刻 料金計算</h2>
    <p>ハワイアン彫り（チャーム2個＋スクロール4個 込み）</p>
  </div>

  <div class="section-title">素材・サイズ</div>

  <div class="field-group">
    <span class="field-label">素材</span>
    <div class="btn-group" id="material-group">
      <button class="btn-opt active" data-val="silver" onclick="setMat(this)">Silver</button>
      <button class="btn-opt" data-val="10K" onclick="setMat(this)">10K</button>
      <button class="btn-opt" data-val="18K" onclick="setMat(this)">18K / Pt900</button>
    </div>
  </div>

  <div class="row">
    <div class="field-group" style="margin-bottom:0">
      <label class="field-label" for="ring-width">幅</label>
      <select id="ring-width" onchange="calc()">
        <option value="3.0">3.0 mm</option>
        <option value="4.0">4.0 mm</option>
        <option value="5.0">5.0 mm</option>
      </select>
    </div>
    <div class="field-group" style="margin-bottom:0">
      <label class="field-label" for="ring-size">号数</label>
      <select id="ring-size" onchange="calc()">
        <option value="1-20">1〜20号</option>
        <option value="21-30">21〜30号</option>
        <option value="31+">31号〜</option>
      </select>
    </div>
  </div>

  <hr class="divider">
  <div class="section-title">加工・オプション</div>

  <div class="toggle-row">
    <div>
      <div class="option-name">ハワイアン彫り</div>
      <div class="option-price">チャーム2個＋スクロール4個 込み</div>
    </div>
    <label class="toggle-wrap">
      <input type="checkbox" id="opt-carving" checked onchange="onCarvingToggle()">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="carving-sub open" id="carving-sub">
    <div class="sub-option">
      <span class="indent-label">彫り範囲</span>
      <div class="radio-btn-group" id="scope-group">
        <button class="radio-btn active" data-val="full" onclick="setScope(this)">全周</button>
        <button class="radio-btn" data-val="half" onclick="setScope(this)">半周（半額）</button>
      </div>
    </div>
  </div>

  <div class="option-row">
    <div>
      <div class="option-name">石留め</div>
      <div class="option-price">¥11,000 / 石</div>
    </div>
    <div class="counter">
      <button class="counter-btn" onclick="change('stone',-1)">−</button>
      <div class="counter-val" id="val-stone">0</div>
      <button class="counter-btn" onclick="change('stone',1)">＋</button>
    </div>
  </div>

  <div class="option-row">
    <div>
      <div class="option-name">チャーム追加</div>
      <div class="option-price">¥11,000 / 個</div>
    </div>
    <div class="counter">
      <button class="counter-btn" onclick="change('charm',-1)">−</button>
      <div class="counter-val" id="val-charm">0</div>
      <button class="counter-btn" onclick="change('charm',1)">＋</button>
    </div>
  </div>

  <hr class="divider">
  <div class="section-title">納期</div>

  <div class="field-group">
    <div class="btn-group" id="delivery-group">
      <button class="btn-opt active" data-val="normal" onclick="setDel(this)">通常（約3週間）<br><span style="font-size:11px;color:var(--color-text-secondary)">追加なし</span></button>
      <button class="btn-opt" data-val="7day" onclick="setDel(this)">7日後納品<br><span style="font-size:11px;color:var(--color-text-secondary)">+¥20,000</span></button>
      <button class="btn-opt" data-val="3day" onclick="setDel(this)">3日後納品<br><span style="font-size:11px;color:var(--color-text-secondary)">+¥40,000</span></button>
    </div>
  </div>

  <div class="result-card">
    <div class="section-title" style="margin-bottom:4px">お見積り</div>
    <div id="result-rows" style="margin-top:1rem">
      <div class="result-row"><span>基本料金（リング）</span><span id="r-base">—</span></div>
      <div class="result-row" id="row-carving"><span id="lbl-carving">ハワイアン彫り（全周）</span><span id="r-carving">—</span></div>
      <div class="result-row" id="row-stone" style="display:none"><span id="lbl-stone">石留め</span><span id="r-stone">—</span></div>
      <div class="result-row" id="row-charm" style="display:none"><span id="lbl-charm">チャーム追加</span><span id="r-charm">—</span></div>
      <div class="result-row" id="row-delivery" style="display:none"><span id="lbl-del">—</span><span id="r-delivery">—</span></div>
      <div class="result-row total"><span>合計（税込）</span><span id="r-total">—</span></div>
    </div>
  </div>
</div>

<script>
const prices = {
  silver: {
    "3.0": {"1-20":56100,"21-30":72710,"31+":73920},
    "4.0": {"1-20":56100,"21-30":72710,"31+":73920},
    "5.0": {"1-20":60500,"21-30":77550,"31+":79200}
  },
  "10K": {
    "3.0": {"1-20":106700,"21-30":111650,"31+":125400},
    "4.0": {"1-20":140800,"21-30":156200,"31+":171600},
    "5.0": {"1-20":154000,"21-30":180400,"31+":191400}
  },
  "18K": {
    "3.0": {"1-20":275000,"21-30":316250,"31+":338250},
    "4.0": {"1-20":275000,"21-30":316250,"31+":338250},
    "5.0": {"1-20":330000,"21-30":376750,"31+":404250}
  }
};

const ringOnly = {
  silver: {"3.0":12100,"4.0":12100,"5.0":16500},
  "10K":  {"3.0":110000,"4.0":110000,"5.0":140000},
  "18K":  {"3.0":220000,"4.0":220000,"5.0":275000}
};

let mat = "silver", del = "normal", scope = "full";
let counts = { stone: 0, charm: 0 };

function setMat(el) {
  document.querySelectorAll("#material-group .btn-opt").forEach(b=>b.classList.remove("active"));
  el.classList.add("active"); mat = el.dataset.val; calc();
}
function setDel(el) {
  document.querySelectorAll("#delivery-group .btn-opt").forEach(b=>b.classList.remove("active"));
  el.classList.add("active"); del = el.dataset.val; calc();
}
function setScope(el) {
  document.querySelectorAll("#scope-group .radio-btn").forEach(b=>b.classList.remove("active"));
  el.classList.add("active"); scope = el.dataset.val; calc();
}
function onCarvingToggle() {
  const sub = document.getElementById("carving-sub");
  const on = document.getElementById("opt-carving").checked;
  sub.classList.toggle("open", on);
  calc();
}
function change(key, delta) {
  counts[key] = Math.max(0, counts[key] + delta);
  document.getElementById("val-"+key).textContent = counts[key];
  calc();
}
function fmt(n) { return "¥" + Math.round(n).toLocaleString("ja-JP"); }

function calc() {
  const width = document.getElementById("ring-width").value;
  const size  = document.getElementById("ring-size").value;
  const carving = document.getElementById("opt-carving").checked;

  const fullTotal = prices[mat][width][size];
  const ringBase  = ringOnly[mat][width];
  const fullCarvingFee = fullTotal - ringBase;

  let total = ringBase;
  document.getElementById("r-base").textContent = fmt(ringBase);

  if (carving) {
    const carvingFee = scope === "half" ? fullCarvingFee / 2 : fullCarvingFee;
    total += carvingFee;
    const label = scope === "half" ? "ハワイアン彫り（半周）" : "ハワイアン彫り（全周）";
    document.getElementById("lbl-carving").textContent = label;
    document.getElementById("r-carving").textContent = fmt(carvingFee);
    document.getElementById("row-carving").style.display = "flex";
  } else {
    document.getElementById("row-carving").style.display = "none";
  }

  if (counts.stone > 0) {
    const s = counts.stone * 11000; total += s;
    document.getElementById("lbl-stone").textContent = `石留め ×${counts.stone}`;
    document.getElementById("r-stone").textContent = fmt(s);
    document.getElementById("row-stone").style.display = "flex";
  } else { document.getElementById("row-stone").style.display = "none"; }

  if (counts.charm > 0) {
    const c = counts.charm * 11000; total += c;
    document.getElementById("lbl-charm").textContent = `チャーム追加 ×${counts.charm}`;
    document.getElementById("r-charm").textContent = fmt(c);
    document.getElementById("row-charm").style.display = "flex";
  } else { document.getElementById("row-charm").style.display = "none"; }

  const rowDel = document.getElementById("row-delivery");
  if (del === "7day") {
    rowDel.style.display = "flex";
    document.getElementById("lbl-del").textContent = "速納（7日後）";
    document.getElementById("r-delivery").textContent = "+¥20,000";
    total += 20000;
  } else if (del === "3day") {
    rowDel.style.display = "flex";
    document.getElementById("lbl-del").textContent = "速納（3日後）";
    document.getElementById("r-delivery").textContent = "+¥40,000";
    total += 40000;
  } else { rowDel.style.display = "none"; }

  document.getElementById("r-total").textContent = fmt(total);
}

calc();
</script>
